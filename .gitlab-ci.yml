# GitLab CI for vauchi-desktop
#
# Tauri desktop application with SolidJS frontend
#
# Performance optimizations:
#   - Self-hosted shell runners: sccache, persistent caches, load-balanced
#   - Change-based rules: Jobs run only when relevant files change
#   - Timeouts: Prevent runaway jobs from blocking runners
#   - Read-only cache for lint jobs
#
# Pipeline strategy:
#   - MR: Validation on relevant file changes
#   - Upstream trigger: Verify compatibility when core merges to main
#
# Uses shared templates from vauchi/scripts for consistency.

# Include shared templates
include:
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/rust-base.yml'
      - '/ci-templates/security.yml'
      - '/ci-templates/coverage.yml'
      - '/ci-templates/mr-rules.yml'
      - '/ci-templates/downstream.yml'
      - '/ci-templates/reuse.yml'
      - '/ci-templates/test-quality.yml'
      - '/ci-templates/mutation.yml'

stages:
  - lint
  - test
  - security
  - mutation
  - verify

# Node.js jobs run on allyson (Linux shell runner).
# nell (macOS) has persistent npm crashes ("Exit handler never called").
# GIT_STRATEGY: clone avoids corruption from stale .git/ on shell runners —
# node jobs don't use .self-hosted's git recovery, and npm deps are cached
# separately so fresh clones cost only the git clone time (~2s shallow).
.node-job:
  tags: [self-hosted, node, linux]
  variables:
    GIT_STRATEGY: clone
    npm_config_cache: ${CI_PROJECT_DIR}/.npm
    PLAYWRIGHT_BROWSERS_PATH: ${CI_PROJECT_DIR}/.playwright
  cache:
    key:
      files:
        - ui/package-lock.json
      prefix: npm
    fallback_keys:
      - npm-${CI_DEFAULT_BRANCH}
      - npm
    paths:
      - .npm/
    policy: pull

# Desktop Rust cache — Cargo.lock and target/ are in src-tauri/
.desktop-cache:
  cache:
    key:
      files:
        - src-tauri/Cargo.lock
      prefix: rust-${CI_JOB_NAME}
    fallback_keys:
      - rust-${CI_JOB_NAME}-${CI_DEFAULT_BRANCH}
      - rust-${CI_JOB_NAME}
    paths:
      - .cargo/bin/
      - .cargo/registry/index/
      - .cargo/registry/cache/
      - src-tauri/target/
    policy: pull-push

# Override shared jobs to run on allyson (Linux shell runner).
# nell (macOS) has persistent git/npm issues under concurrency.
reuse-lint:
  tags: [self-hosted, reuse, linux]

quality:zero-assertions:
  tags: [self-hosted, rust, linux]
  script:
    - |
      # Fetch single script via GitLab API (faster than git clone)
      curl -fsSL "https://gitlab.com/vauchi/scripts/-/raw/${CI_DEFAULT_BRANCH}/scripts/check-zero-assertions.sh" -o /tmp/check-zero-assertions.sh
      chmod +x /tmp/check-zero-assertions.sh

      DIRS=""
      for dir in src tests; do
        if [ -d "$dir" ]; then DIRS="$DIRS $dir"; fi
      done
      for dir in */src */tests; do
        if [ -d "$dir" ]; then DIRS="$DIRS $dir"; fi
      done

      if [ -n "$DIRS" ]; then
        /tmp/check-zero-assertions.sh $DIRS
      else
        echo "No test directories found — skipping"
      fi

quality:test-ratio:
  tags: [self-hosted, rust, linux]
  script:
    - |
      # Fetch single script via GitLab API (faster than git clone)
      curl -fsSL "https://gitlab.com/vauchi/scripts/-/raw/${CI_DEFAULT_BRANCH}/scripts/test-code-ratio.sh" -o /tmp/test-code-ratio.sh
      chmod +x /tmp/test-code-ratio.sh

      for dir in . */; do
        dir="${dir%/}"
        if [ -d "$dir/src" ]; then
          echo ""
          /tmp/test-code-ratio.sh "$dir"
        fi
      done

# ============================================================
# Lint Stage — Preflight Gate (change-based)
# ============================================================
# Cheapest checks run first. Test + security jobs wait for these
# to pass before starting (PI-13 fail-fast DAG).

# Build frontend first (needed for Tauri's generate_context!)
build:frontend-dist:
  extends: [.node-job, .timeout-quick]
  stage: lint
  needs: []
  cache:
    policy: pull-push
  script:
    - cd ui && npm ci --prefer-offline && npm run build
  artifacts:
    paths:
      - ui/dist/
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "ui/**/*"
          - "src-tauri/**/*"
          - ".gitlab-ci.yml"
          - ".gitignore"
          - "CLAUDE.md"
          - "REUSE.toml"
    # Also run on upstream triggers (needed by verify:upstream-compat)
    - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "api"
    # Also run on main/schedule (needed by coverage + mutation jobs)
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

# HTML linting (runs on frontend HTML changes)
lint:html:
  stage: lint
  tags:
    - self-hosted
    - node
    - linux
  needs: []
  script:
    - htmlhint ui/index.html
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "ui/index.html"
          - ".gitlab-ci.yml"

# Security assertion: devtools feature must never appear in production Cargo.toml.
# The devtools Cargo feature enables Tauri's WebView inspector in release builds,
# which would expose app internals. This check prevents accidental regression.
security:no-devtools:
  stage: lint
  tags:
    - self-hosted
    - rust
    - linux
  needs: []
  script:
    - "! grep -q 'devtools' src-tauri/Cargo.toml || (echo 'ERROR: devtools feature found in src-tauri/Cargo.toml — this must not be enabled in production builds' && exit 1)"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "src-tauri/Cargo.toml"
          - ".gitlab-ci.yml"

# Rust linting (runs on Rust code changes)
lint:rust-format:
  extends: [.rust-runner-nocache, .lint-format, .timeout-quick]
  needs: []
  script:
    - cd src-tauri && cargo fmt --all -- --check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "src-tauri/**/*.rs"
          - "src-tauri/Cargo.toml"
          - ".gitlab-ci.yml"

lint:rust-clippy:
  extends: [.rust-runner, .lint-clippy, .desktop-cache, .timeout-standard]
  needs: [build:frontend-dist]
  cache:
    policy: pull  # Read-only cache for lint
  before_script:
    - !reference [.self-hosted, before_script]
    - !reference [.clone-locales, before_script]
    - !reference [.clone-themes, before_script]
  script:
    - cd src-tauri && cargo clippy --all-targets --no-default-features --features custom-protocol -- -D warnings
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "src-tauri/**/*.rs"
          - "src-tauri/Cargo.toml"
          - "ui/**/*"
          - ".gitlab-ci.yml"

# Frontend linting (runs on frontend code changes)
lint:frontend:
  extends: [.node-job, .timeout-quick]
  stage: lint
  needs: []
  script:
    - cd ui && npm ci --prefer-offline && npm run lint --if-present
    - npm run lint:css --if-present
    - npm run typecheck --if-present
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "ui/**/*"
          - ".gitlab-ci.yml"

# ============================================================
# Test Stage (change-based, gated by lint)
# ============================================================

# Rust tests
test:rust:
  extends: [.rust-runner, .desktop-cache, .timeout-standard]
  stage: test
  needs:
    - job: build:frontend-dist
      artifacts: true
    - job: lint:rust-format
      optional: true
  before_script:
    - !reference [.self-hosted, before_script]
    - !reference [.clone-locales, before_script]
    - !reference [.clone-themes, before_script]
  script:
    - cd src-tauri && cargo nextest run --profile ci --all-targets --no-default-features --features custom-protocol
  artifacts:
    when: always
    reports:
      junit: src-tauri/target/nextest/ci/junit.xml
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "src-tauri/**/*"
          - "ui/**/*"
          - ".gitlab-ci.yml"

# Frontend functional tests — excludes @visual and @a11y (they have
# dedicated jobs). Runs only chromium (other browsers not installed).
# Each Playwright job uses a unique PLAYWRIGHT_PORT for parallel execution.
test:frontend:
  extends: [.node-job, .timeout-quick]
  stage: test
  variables:
    PLAYWRIGHT_PORT: "1420"
  needs:
    - job: build:frontend-dist
      artifacts: true
    - job: lint:frontend
      optional: true
  script:
    - cd ui && npm ci --prefer-offline
    - npx playwright install chromium
    - npx playwright test --project=chromium --grep-invert "@visual|@a11y|@stub"
  artifacts:
    when: on_failure
    paths:
      - ui/playwright-report/
      - ui/e2e/test-results/
    expire_in: 3 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "ui/**/*"
          - ".gitlab-ci.yml"

# Visual regression tests (Playwright screenshot comparison)
# NOTE: Requires Tauri runtime (Rust + GTK + WebKit). Cannot run in a
# plain Node.js container. Allowed to fail until full Tauri CI image is
# available. Run locally with: cd ui && npm run test:visual
# Port-isolated via PLAYWRIGHT_PORT — runs in parallel with other Playwright jobs
test:visual-regression:
  extends: [.node-job, .timeout-standard]
  stage: test
  variables:
    PLAYWRIGHT_PORT: "1421"
  needs:
    - job: build:frontend-dist
      artifacts: true
  allow_failure: true
  script:
    - cd ui && npm ci --prefer-offline
    - npx playwright install chromium
    - npx playwright test --grep @visual --project visual-chromium --reporter=html
  artifacts:
    when: always
    paths:
      - ui/playwright-report/
      - ui/e2e/test-results/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "ui/**/*"
          - ".gitlab-ci.yml"

# Accessibility tests — axe-core critical violations fail the build (PI-12)
# Runs the @a11y Playwright tests which use @axe-core/playwright to check
# WCAG 2.0 AA compliance on all pages. Critical violations are blocking.
# Port-isolated via PLAYWRIGHT_PORT — runs in parallel with other Playwright jobs
test:accessibility:
  extends: [.node-job, .timeout-standard]
  stage: test
  variables:
    PLAYWRIGHT_PORT: "1422"
  needs:
    - job: build:frontend-dist
      artifacts: true
  script:
    - cd ui && npm ci --prefer-offline
    - npx playwright install chromium
    - npx playwright test --grep @a11y --project chromium --reporter=html
  artifacts:
    when: always
    paths:
      - ui/playwright-report/
      - ui/e2e/test-results/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "ui/**/*"
          - ".gitlab-ci.yml"

# ============================================================
# Coverage Stage (main branch only)
# ============================================================

coverage:rust:
  extends: [.coverage-job, .rust-runner, .desktop-cache, .timeout-long]
  needs:
    - job: build:frontend-dist
      artifacts: true
  before_script:
    - !reference [.self-hosted, before_script]
    - !reference [.clone-locales, before_script]
    - !reference [.clone-themes, before_script]
    - rustup component add llvm-tools-preview 2>/dev/null || true
  variables:
    COVERAGE_WORKDIR: "src-tauri"
    COVERAGE_EXTRA_FLAGS: "--no-default-features --features custom-protocol"
    COVERAGE_REPO_LABEL: "desktop-rust"
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "api"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

coverage:frontend:
  extends: [.node-job, .timeout-quick]
  stage: test
  needs:
    - job: build:frontend-dist
      artifacts: true
  script:
    - cd ui && npm ci --prefer-offline && npx vitest run --coverage --reporter=default --coverage.reporter=cobertura
    - cd "$CI_PROJECT_DIR"
    - |
      curl --silent --fail \
        "${CI_API_V4_URL}/projects/vauchi%2Fscripts/repository/files/scripts%2Fci%2Fpush-coverage.sh/raw?ref=main" \
        -o push-coverage.sh
      chmod +x push-coverage.sh
    - ./push-coverage.sh ui/coverage/cobertura-coverage.xml desktop-ui || true
  coverage: '/lines:\s+(\d+(?:\.\d+)?%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: ui/coverage/cobertura-coverage.xml
    paths:
      - ui/coverage/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "api"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "schedule"

# ============================================================
# Mutation Stage (PI-02)
# ============================================================

# Nightly full mutation testing on Rust backend (scheduled pipeline)
mutation:nightly:
  extends: [.mutation-nightly, .rust-runner, .desktop-cache, .timeout-extended]
  # Override: Tauri's generate_context! requires built frontend
  needs: [build:frontend-dist]
  before_script:
    - !reference [.self-hosted, before_script]
    - !reference [.clone-locales, before_script]
    - !reference [.clone-themes, before_script]
  variables:
    MUTATION_EXTRA_FLAGS: "--no-default-features --features custom-protocol"
    MUTATION_WORKDIR: "src-tauri"

# ============================================================
# Security Stage (change-based, gated by lint, parallel with test)
# ============================================================

# Rust security audit (runs on dependency changes)
security:audit:
  extends: [.rust-runner-readonly, .security-audit, .timeout-quick]
  needs:
    - job: lint:rust-format
      optional: true
  cache:
    key:
      files:
        - src-tauri/Cargo.lock
      prefix: rust-${CI_JOB_NAME}
    fallback_keys:
      - rust-${CI_JOB_NAME}-${CI_DEFAULT_BRANCH}
      - rust-${CI_JOB_NAME}
    paths:
      - .cargo/bin/
      - .cargo/registry/index/
      - .cargo/registry/cache/
      - src-tauri/target/
    policy: pull
  before_script:
    - !reference [.self-hosted, before_script]
    - command -v cargo-audit >/dev/null 2>&1 || cargo binstall cargo-audit --no-confirm 2>/dev/null || cargo install cargo-audit
  script:
    - cd src-tauri && cargo audit
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "src-tauri/Cargo.toml"
          - "src-tauri/Cargo.lock"
          - ".gitlab-ci.yml"

# Full cargo-deny check: advisories, licenses, bans, sources
security:deny:
  extends: [.rust-runner-readonly, .security-deny, .timeout-quick]
  needs:
    - job: lint:rust-format
      optional: true
  cache:
    key:
      files:
        - src-tauri/Cargo.lock
      prefix: rust-${CI_JOB_NAME}
    fallback_keys:
      - rust-${CI_JOB_NAME}-${CI_DEFAULT_BRANCH}
      - rust-${CI_JOB_NAME}
    paths:
      - .cargo/bin/
      - .cargo/registry/index/
      - .cargo/registry/cache/
      - src-tauri/target/
    policy: pull
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "schedule"
  before_script:
    - !reference [.self-hosted, before_script]
    - command -v cargo-deny >/dev/null 2>&1 || cargo binstall cargo-deny --no-confirm 2>/dev/null || cargo install cargo-deny
  script:
    - cd src-tauri && cargo deny check

# npm audit for frontend (runs on package changes)
security:npm-audit:
  extends: [.node-job, .timeout-quick]
  stage: security
  needs:
    - job: lint:frontend
      optional: true
  script:
    - cd ui && npm ci --prefer-offline && npm audit --audit-level=moderate
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        compare_to: refs/heads/$CI_DEFAULT_BRANCH
        paths:
          - "ui/package.json"
          - "ui/package-lock.json"
          - ".gitlab-ci.yml"

# ============================================================
# Verify Stage (upstream trigger only)
# ============================================================
# Runs when core merges to main and triggers this repo via
# verify:downstream-rust. Verifies the Tauri backend builds and
# tests pass against the updated vauchi-core.
# Requires build:frontend-dist (Tauri's generate_context! needs ui/dist/).

verify:upstream-compat:
  extends: [.rust-runner, .desktop-cache, .verify-on-upstream, .timeout-standard]
  stage: verify
  needs: [build:frontend-dist]
  before_script:
    - !reference [.self-hosted, before_script]
    - !reference [.clone-locales, before_script]
    - !reference [.clone-themes, before_script]
  script:
    - cd src-tauri && cargo nextest run --all-targets --no-default-features --features custom-protocol
